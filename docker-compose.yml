version: "3.9"

services:
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.1.1
    container_name: quantstream-redpanda
    command:
      - redpanda start
      - --smp 1
      - --overprovisioned
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://redpanda:8082,external://localhost:18082
      - --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:18081
    ports:
      - "19092:19092"
      - "18081:18081"
      - "19644:9644"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - quantstream-net

  redpanda-init:
    image: docker.redpanda.com/redpandadata/redpanda:v24.1.1
    container_name: quantstream-redpanda-init
    depends_on:
      redpanda:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Waiting for Redpanda..."
        rpk cluster info --brokers redpanda:9092
        echo "Creating topics..."
        rpk topic create raw.trades --partitions 3 --replicas 1 -c retention.ms=604800000 --brokers redpanda:9092 || true
        rpk topic create dead-letter.trades --partitions 3 --replicas 1 -c retention.ms=2592000000 --brokers redpanda:9092 || true
        echo "Topics created."
        rpk topic list --brokers redpanda:9092
    networks:
      - quantstream-net

  minio:
    image: minio/minio:RELEASE.2024-02-14T21-36-28Z
    container_name: quantstream-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - quantstream-net

  minio-init:
    image: minio/mc:RELEASE.2024-02-14T21-36-28Z
    container_name: quantstream-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        mc alias set local http://minio:9000 minioadmin minioadmin
        mc mb local/quantstream --ignore-existing
        echo "MinIO bucket 'quantstream' ready."
    networks:
      - quantstream-net

  spark-master:
    image: bitnami/spark:3.5.1
    container_name: quantstream-spark-master
    environment:
      SPARK_MODE: master
      SPARK_RPC_AUTHENTICATION_ENABLED: "no"
      SPARK_RPC_ENCRYPTION_ENABLED: "no"
      SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED: "no"
      SPARK_SSL_ENABLED: "no"
    ports:
      - "7077:7077"
      - "8080:8080"
    networks:
      - quantstream-net

  spark-worker:
    image: bitnami/spark:3.5.1
    container_name: quantstream-spark-worker
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark-master:7077
      SPARK_WORKER_MEMORY: 2G
      SPARK_WORKER_CORES: 2
      SPARK_RPC_AUTHENTICATION_ENABLED: "no"
      SPARK_RPC_ENCRYPTION_ENABLED: "no"
      SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED: "no"
      SPARK_SSL_ENABLED: "no"
    depends_on:
      - spark-master
    ports:
      - "8081:8081"
    networks:
      - quantstream-net

  prometheus:
    image: prom/prometheus:v2.50.0
    container_name: quantstream-prometheus
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    ports:
      - "9090:9090"
    networks:
      - quantstream-net

  grafana:
    image: grafana/grafana:10.4.0
    container_name: quantstream-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./config/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./config/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - quantstream-net

volumes:
  minio-data:
  prometheus-data:
  grafana-data:

networks:
  quantstream-net:
    driver: bridge
