global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  - "alerts.yml"

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "redpanda"
    static_configs:
      - targets: ["redpanda:9644"]
    metrics_path: "/public_metrics"

  - job_name: "fastapi"
    static_configs:
      - targets: ["host.docker.internal:8000"]

  - job_name: "ingestion-producer"
    static_configs:
      - targets: ["host.docker.internal:8001"]

  - job_name: "spark-master"
    static_configs:
      - targets: ["spark-master:8080"]
    metrics_path: "/metrics/master/json/"

  - job_name: "spark-worker"
    static_configs:
      - targets: ["spark-worker:8081"]
    metrics_path: "/metrics/worker/json/"
